<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Strength Checker</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f4ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 25px;
        width: 350px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        border-radius: 12px;
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        width: 100%;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 8px;
        outline: none;
        font-size: 16px;
    }

    input:focus {
        border-color: #5a67d8;
    }

    .strength-bar {
        width: 100%;
        height: 10px;
        background: #ddd;
        border-radius: 5px;
        margin-top: 15px;
        overflow: hidden;
    }

    .strength-fill {
        height: 100%;
        width: 0%;
        transition: width 0.4s ease, background 0.4s ease;
        border-radius: 5px;
    }

    .strength-text {
        margin-top: 10px;
        font-weight: bold;
    }
</style>

</head>
<body>

<div class="container">
    <h2>Password Strength Checker</h2>

    <input type="password" id="password" placeholder="Enter password" onkeyup="checkStrength()">

    <div class="strength-bar">
        <div id="strength-fill" class="strength-fill"></div>
    </div>

    <div id="strength-text" class="strength-text">Strength: </div>
</div>

<script>
function checkStrength() {
    let password = document.getElementById("password").value;
    let strengthFill = document.getElementById("strength-fill");
    let strengthText = document.getElementById("strength-text");

    let strength = 0;

    if (password.match(/[a-z]/)) strength++;
    if (password.match(/[A-Z]/)) strength++;
    if (password.match(/[0-9]/)) strength++;
    if (password.match(/[@$!%*?&]/)) strength++;
    if (password.length >= 8) strength++;

    if (strength == 0) {
        strengthFill.style.width = "0%";
        strengthText.innerHTML = "Strength: ";
    }
    else if (strength <= 2) {
        strengthFill.style.width = "30%";
        strengthFill.style.background = "red";
        strengthText.innerHTML = "Strength: Weak ❌";
    }
    else if (strength == 3 || strength == 4) {
        strengthFill.style.width = "70%";
        strengthFill.style.background = "orange";
        strengthText.innerHTML = "Strength: Medium ⚠";
    }
    else {
        strengthFill.style.width = "100%";
        strengthFill.style.background = "green";
        strengthText.innerHTML = "Strength: Strong ✅";
    }
}
</script>

</body>
</html>
